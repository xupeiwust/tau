# Production API deploy, GitOps-triggered on push to `production`.
# UI production deploys are handled by Netlify Git integration for `taucad-prod-us`.
#
# Manual hotfix: `gh workflow run deploy.yml -f environment=production -f app=api`
name: Production Deploy (on merge to production)

on:
  push:
    branches: [production]

concurrency:
  group: prod-deploy-on-merge
  cancel-in-progress: false

jobs:
  deploy-api:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
      app: api
    secrets: inherit
