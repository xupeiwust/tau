# Manual production deploy of Tau UI to Netlify (`taucad-prod-us` site, https://tau.new).
#
# Triggered exclusively via `workflow_dispatch` so a human can stage releases
# off the back of a known-good `main` revision (or any other ref). The Netlify
# `taucad-prod-us` site has automatic Git builds stopped (Terraform sets
# `deploy_mode = "ci"` → `stop_builds=true` in
# `repos/cloud-infra/modules/netlify-site`), so this workflow is the only
# deploy path.
#
# The `prod-us` suffix anticipates future regional production sites
# (`taucad-prod-eu`, etc.). When adding a region, fork this workflow and
# matching `apps/ui/netlify.{region}.toml`.
#
# Build flow:
#   1. checkout → setup-nx → `pnpm nx build ui` (NX_PREFER_NODE_STRIP_TYPES so
#      pnpm prod-skip of devDeps doesn't break Nx graph construction)
#   2. inject + upload PostHog source maps via the `ui:sourcemaps` Nx target
#   3. `netlify deploy --prod --config apps/ui/netlify.prod.toml` via
#      `pnpm -F @taucad/scripts exec netlify` (catalog-pinned in
#      pnpm-workspace.yaml, installed under @taucad/scripts)
#
# Required GitHub `production` environment values:
#   - secrets.NETLIFY_AUTH_TOKEN     : Netlify personal access token
#   - vars.NETLIFY_PROD_US_SITE_ID   : `taucad-prod-us` site UUID (output by
#                                       `tau-cloud-prod-us` HCP workspace)
#   - secrets.POSTHOG_CLI_TOKEN      : PostHog CLI token for source-map upload
#   - secrets.POSTHOG_CLI_ENV_ID     : PostHog CLI environment ID

name: Deploy UI to Netlify Production (prod-us)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (default: main)'
        required: false
        default: 'main'

concurrency: deploy-ui-netlify-prod-us

jobs:
  deploy:
    name: Deploy UI to Netlify (taucad-prod-us)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Nx Environment
        uses: ./.github/actions/setup-nx

      - name: Build UI
        run: NX_PREFER_NODE_STRIP_TYPES=true pnpm nx build ui

      - name: Inject + upload PostHog source maps
        run: pnpm nx run ui:sourcemaps
        env:
          POSTHOG_CLI_TOKEN: ${{ secrets.POSTHOG_CLI_TOKEN }}
          POSTHOG_CLI_ENV_ID: ${{ secrets.POSTHOG_CLI_ENV_ID }}

      - name: Deploy to Netlify (taucad-prod-us)
        run: |
          pnpm -F @taucad/scripts exec netlify deploy \
            --prod \
            --site "${NETLIFY_PROD_US_SITE_ID}" \
            --config apps/ui/netlify.prod.toml \
            --dir apps/ui/build/client \
            --functions apps/ui/build/server \
            --message "prod-us ${GITHUB_SHA::7}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_PROD_US_SITE_ID: ${{ vars.NETLIFY_PROD_US_SITE_ID }}

      # Confirm the new SSR build is serving the UI health endpoint added
      # alongside R13 — surfaces a broken build (e.g. missing route, dead
      # bundle) before users hit it. `--retry` rides out Netlify's
      # CDN-warmup window. See
      # `docs/research/staging-cors-coep-safari-rendering-audit.md` (NEW UI
      # health routes).
      - name: Verify UI /health/live
        run: |
          curl -sSf --retry 5 --retry-delay 5 --max-time 10 \
            -o /dev/null -w "HTTP %{http_code}\n" \
            https://tau.new/health/live

      # Post-deploy CORS smoke test (R13). Validates the prod UI origin can
      # talk to the prod API. Catches regressions like the 4-month-undetected
      # api.taucad.dev cert/app misalignment described in
      # `docs/research/staging-cors-coep-safari-rendering-audit.md` Finding
      # 11. Per user instruction this is post-deploy only — no daily cron.
      - name: Verify prod CORS reachability
        run: bash scripts/src/smoke-cors.sh
        env:
          API_URL: https://api.tau.new
          ORIGIN: https://tau.new
