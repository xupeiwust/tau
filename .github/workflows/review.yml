name: Deploy Review Apps

on:
  # Existing review apps are updated whenever a tracked PR is updated.
  # Trail PRs targeting `production` (auto-generated by `prepare-prod-release.yml`)
  # never get a review app — production rolls out via `prod-deploy-on-merge.yml`
  # against the long-lived `tau-api` Fly app and the `taucad-prod-us` Netlify site.
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches-ignore:
      - production

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  # Match the region with production apps
  FLY_REGION: syd
  FLY_ORG: personal
  # API review app + paired Netlify deploy-preview URL.
  API_APP_NAME: tau-api-pr-${{ github.event.number }}
  API_REVIEW_URL: https://tau-api-pr-${{ github.event.number }}.fly.dev
  UI_PREVIEW_URL: https://deploy-preview-${{ github.event.number }}--taucad.netlify.app

jobs:
  # The per-PR UI is built by the Netlify GitHub integration on the `taucad`
  # site (deploy-preview context, scoped by `apps/ui/netlify.toml`). Reviewers
  # click the Netlify comment on the PR to access the UI; the API job below
  # provides the per-PR backend the preview connects to.
  review_app_api:
    name: Deploy API Review App
    runs-on: ubuntu-latest
    # Skip Dependabot PRs
    if: github.actor != 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: read
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    # Only run one deployment at a time per PR for API.
    # Cancel in-progress runs when a new commit is pushed to the same PR
    concurrency:
      group: pr-${{ github.event.number }}-api
      cancel-in-progress: true

    environment:
      name: review-api
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Get code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Post initial API status
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: fly-review-api
          message: |
            ### API Preview :octopus:
            **Status:** ${{ github.event.action == 'closed' && '🗑️ Destroying...' || '🔄 Deploying...' }}
            **API URL:** ${{ env.API_REVIEW_URL }}
            **Paired UI:** ${{ env.UI_PREVIEW_URL }} (Netlify deploy preview)

      - name: Deploy API PR app to Fly.io
        id: deploy
        continue-on-error: true
        uses: superfly/fly-pr-review-apps@5d9f067254bebd0aaa77d908d6337b63f4d4f019 # v1.6.0
        with:
          name: ${{ env.API_APP_NAME }}
          region: syd
          config: apps/api/fly.staging.toml
          secrets: TAU_FRONTEND_URL=${{ env.UI_PREVIEW_URL }} AUTH_URL=${{ env.API_REVIEW_URL }} ADDITIONAL_CORS_ORIGINS=["${{ env.UI_PREVIEW_URL }}"]

      - name: Update API status - success
        if: steps.deploy.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: fly-review-api
          message: |
            ### API Preview :octopus:
            **Status:** ${{ github.event.action == 'closed' && '✅ Destroyed' || '✅ Deployed' }}
            **API URL:** ${{ github.event.action == 'closed' && '_Review app destroyed_' || env.API_REVIEW_URL }}
            **Paired UI:** ${{ github.event.action == 'closed' && '_Netlify preview will be auto-cleaned_' || format('{0} (Netlify deploy preview)', env.UI_PREVIEW_URL) }}

      - name: Update API status - failure
        if: steps.deploy.outcome == 'failure'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: fly-review-api
          message: |
            ### API Preview :octopus:
            **Status:** ❌ Deployment Failed
            **API URL:** ${{ env.API_REVIEW_URL }}

      - name: Update API status - cancelled
        if: steps.deploy.outcome == 'cancelled'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: fly-review-api
          message: |
            ### API Preview :octopus:
            **Status:** ⚠️ Deployment Cancelled
            **API URL:** ${{ env.API_REVIEW_URL }}

      - name: Fail job if deployment failed
        if: steps.deploy.outcome == 'failure' || steps.deploy.outcome == 'cancelled'
        run: exit 1
