name: CI

on:
  push:
    branches: [main] # Only run on pushes to main branch
  pull_request:
    # Run CI on all pull requests

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

# Cancel in-progress runs when a new workflow with the same group name is triggered
# This can save 10-50% on CI compute costs.
# For pull requests, include the head ref to allow different PRs to run concurrently
# while still canceling outdated runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' }}

jobs:
  formatting:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nx Environment
        uses: ./.github/actions/setup-nx

      - name: Check formatting
        run: pnpm format:check

  docs:
    name: Validate docs frontmatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nx Environment
        uses: ./.github/actions/setup-nx

      - name: Validate frontmatter
        run: pnpm docs:validate

  project-names:
    name: Validate project names
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nx Environment
        uses: ./.github/actions/setup-nx

      - name: Validate project names
        run: pnpm projects:validate

  license-deps:
    name: Validate license-deps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nx Environment
        uses: ./.github/actions/setup-nx

      - name: Validate license-deps
        run: pnpm license-deps:validate

  knip:
    name: Dead code analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nx Environment
        uses: ./.github/actions/setup-nx

      - name: Run Knip
        run: pnpm knip

  affected:
    name: Run affected tasks
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && 'production' || null }}
    permissions: # Required for nrwl/nx-set-shas to read workflow runs
      contents: 'read'
      actions: 'read'
      pull-requests: 'read'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Nx Environment
        uses: ./.github/actions/setup-nx

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Connect your workspace by running "nx connect" and uncomment this
      # - run: npx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      # Nx Affected runs only tasks affected by the changes in this PR/commit
      # Learn more: https://nx.dev/ci/features/affected
      - name: Run affected tasks
        run: pnpm nx affected -t lint test build typecheck size

  size-report:
    name: Bundle size report
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nx Environment
        uses: ./.github/actions/setup-nx

      - name: Check bundle sizes
        uses: andresz1/size-limit-action@94bc357df29c36c8f8d50ea497c3e225c3c95d1d # v1.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build_script: 'size:build'
          package_manager: pnpm

  # Check what changed to determine what to deploy
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions: # Required for nrwl/nx-set-shas to read workflow runs
      contents: 'read'
      actions: 'read'
      pull-requests: 'read'
    outputs:
      affected_apps: ${{ steps.affected.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Nx Environment
        uses: ./.github/actions/setup-nx

      - name: Check affected apps
        id: affected
        run: |
          # Get list of affected app projects as JSON (last line only to filter out log messages)
          affected_apps=$(pnpm nx show projects --affected --type=app --json | tail -1)
          echo "Affected apps: $affected_apps"
          echo "apps<<EOF" >> $GITHUB_OUTPUT
          echo "$affected_apps" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # API Docker smoke test — catches Dockerfile regressions (multi-stage build,
  # `--parents` package-json copy, pnpm install filter, runtime user, etc.)
  # before they reach Fly.io. Boots the built image with placeholder env
  # values that satisfy schema validation, then polls `/health/live` until
  # the app reports ready (memory heap only — no external dependencies
  # required, so we don't need a real DB/Redis here; deploy.yml uses
  # `/health/ready` which does check those). Intentionally narrow: does not
  # validate runtime behaviour, only that the container starts and serves.
  api-docker-smoke:
    name: API Docker smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build API image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: tau-api:smoke
          # Read-through both caches so the smoke test benefits from the
          # production deploy's registry cache when available. Cache-to
          # writes only to GHA — PRs from forks can't push to registry.fly.io
          # and we don't want to invalidate the production cache from a PR.
          cache-from: |
            type=gha
            type=registry,ref=registry.fly.io/tau-api-staging:buildcache
          cache-to: type=gha,mode=max
          # Secret may be unset for fork PRs. The Dockerfile tolerates a
          # missing nx_cloud_token secret (Nx falls back to local cache).
          secrets: |
            nx_cloud_token=${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

      - name: Start container
        run: |
          docker run -d --name tau-api-smoke -p 3000:3000 \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e DATABASE_URL=postgres://user:pass@localhost:5432/none \
            -e TAU_FRONTEND_URL=http://localhost \
            -e LOG_LEVEL=info \
            -e OPENAI_API_KEY=sk-smoke \
            -e ANTHROPIC_API_KEY=sk-ant-smoke \
            -e GOOGLE_VERTEX_AI_CREDENTIALS='{"type":"service_account","project_id":"smoke","private_key_id":"smoke","private_key":"smoke","client_email":"smoke@example.com","client_id":"smoke","auth_uri":"https://example.com","token_uri":"https://example.com","auth_provider_x509_cert_url":"https://example.com","client_x509_cert_url":"https://example.com","universe_domain":"example.com"}' \
            -e AUTH_SECRET=smoke-secret \
            -e AUTH_URL=http://localhost \
            -e GITHUB_CLIENT_ID=smoke \
            -e GITHUB_CLIENT_SECRET=smoke \
            -e ZOO_API_KEY=smoke \
            -e REDIS_URL=redis://localhost:6379 \
            tau-api:smoke

      - name: Poll /health/live
        run: |
          for i in $(seq 1 60); do
            if ! docker ps --format '{{.Names}}' | grep -q '^tau-api-smoke$'; then
              echo "::error::Container exited before becoming healthy"
              docker logs tau-api-smoke || true
              exit 1
            fi
            if curl --silent --fail --max-time 2 http://localhost:3000/health/live >/dev/null; then
              echo "Container healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::/health/live did not respond with 200 within 60s"
          docker logs tau-api-smoke || true
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f tau-api-smoke || true

  # Staging deployments — deploy after builds pass so the Nx Cloud cache is populated.
  # The staging UI is hosted on Netlify (`taucad` site, custom domain `taucad.dev`)
  # and rebuilt automatically by the Netlify GitHub integration on every push to
  # `main` (production context) and on every PR (deploy-preview context); only
  # the API ships to Fly here (`tau-api-staging`).
  deploy-api-staging:
    name: Deploy API (Staging)
    needs: [formatting, affected, changes]
    if: contains(fromJSON(needs.changes.outputs.affected_apps), 'api')
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      app: api
    secrets: inherit
