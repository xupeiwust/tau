# Reusable workflow for deploying API to Fly.io.
# Supports the staging API (`tau-api-staging`, `api.taucad.dev`) and the
# production API (`tau-api`, `api.tau.new`).
#
# The build pipeline:
#   1. Authenticate Docker against `registry.fly.io` using FLY_API_TOKEN.
#   2. Build via `docker/build-push-action` so we can opt-in to:
#        - Registry-backed BuildKit cache (`type=registry,mode=max`) so
#          intermediate `deps`/`build` stages survive across runs and across
#          GitHub-Actions runners (R13 in
#          docs/research/api-docker-build-optimization.md).
#        - Nx Cloud build secret (`nx_cloud_token`) so `pnpm nx build api`
#          can read NX_CLOUD_ACCESS_TOKEN without baking it into a layer
#          (R8). The Dockerfile reads it via
#          `--mount=type=secret,id=nx_cloud_token,env=NX_CLOUD_ACCESS_TOKEN`.
#   3. Push the resulting image to `registry.fly.io/<app>:<sha>` and deploy
#      it via `flyctl deploy --image ...` so Fly.io skips its own builder.
#
# The UI is hosted on Netlify (staging site `taucad` / production site
# `taucad-prod`); see docs/architecture/ui-deployment-topology.md for the
# full topology.

name: Deploy to Fly.io

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Environment to deploy (staging or production)'
      app:
        required: true
        type: string
        description: 'App to deploy (api)'
  workflow_dispatch:
    # Manual trigger from GitHub UI
    inputs:
      environment:
        required: true
        type: choice
        description: 'Environment to deploy'
        options:
          - staging
          - production
      app:
        required: true
        type: choice
        description: 'App to deploy'
        options:
          - api

jobs:
  deploy:
    name: Deploy ${{ inputs.app }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency: deploy-${{ inputs.app }}-${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve deploy targets
        id: targets
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            FLY_APP="tau-api-staging"
            CONFIG_FILE="apps/${{ inputs.app }}/fly.staging.toml"
            API_URL="https://api.taucad.dev"
            UI_ORIGIN="https://taucad.dev"
          elif [ "${{ inputs.environment }}" = "production" ]; then
            FLY_APP="tau-api"
            CONFIG_FILE="apps/${{ inputs.app }}/fly.prod.toml"
            API_URL="https://api.tau.new"
            UI_ORIGIN="https://tau.new"
          else
            echo "::error::Invalid environment: ${{ inputs.environment }}"
            exit 1
          fi
          echo "fly_app=${FLY_APP}" >> "$GITHUB_OUTPUT"
          echo "config_file=${CONFIG_FILE}" >> "$GITHUB_OUTPUT"
          echo "image=registry.fly.io/${FLY_APP}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "cache_ref=registry.fly.io/${FLY_APP}:buildcache" >> "$GITHUB_OUTPUT"
          # CORS smoke-test inputs (R13 — see
          # docs/research/staging-cors-coep-safari-rendering-audit.md).
          # Keyed on environment so the same workflow validates both staging
          # and production reachability with no further per-env branching.
          echo "api_url=${API_URL}" >> "$GITHUB_OUTPUT"
          echo "ui_origin=${UI_ORIGIN}" >> "$GITHUB_OUTPUT"

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Authenticate to registry.fly.io
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: apps/${{ inputs.app }}/Dockerfile
          push: true
          tags: ${{ steps.targets.outputs.image }}
          # `mode=max` is required for monorepos so intermediate stages
          # (`deps`/`build`) survive in the cache, not just the final stage.
          cache-from: type=registry,ref=${{ steps.targets.outputs.cache_ref }}
          cache-to: type=registry,ref=${{ steps.targets.outputs.cache_ref }},mode=max
          secrets: |
            nx_cloud_token=${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

      - name: Deploy prebuilt image to Fly.io
        run: |
          echo "Deploying ${{ steps.targets.outputs.image }} to ${{ inputs.environment }}"
          flyctl deploy \
            --app "${{ steps.targets.outputs.fly_app }}" \
            --config "${{ steps.targets.outputs.config_file }}" \
            --image "${{ steps.targets.outputs.image }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Post-deploy CORS smoke test (R13). Catches regressions like the
      # 4-month-undetected api.taucad.dev cert/app misalignment described in
      # `docs/research/staging-cors-coep-safari-rendering-audit.md` Finding
      # 11. Per user instruction this is post-deploy only — no daily cron.
      - name: Verify CORS reachability
        run: bash scripts/src/smoke-cors.sh
        env:
          API_URL: ${{ steps.targets.outputs.api_url }}
          ORIGIN: ${{ steps.targets.outputs.ui_origin }}
