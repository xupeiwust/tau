# Reusable workflow for deploying to Fly.io
# Supports both staging (taucad.dev) and production (tau.new) environments

name: Deploy to Fly.io

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Environment to deploy (staging or production)'
      app:
        required: true
        type: string
        description: 'App to deploy (api or ui)'
  workflow_dispatch:
    # Manual trigger from GitHub UI
    inputs:
      environment:
        required: true
        type: choice
        description: 'Environment to deploy'
        options:
          - staging
          - production
      app:
        required: true
        type: choice
        description: 'App to deploy'
        options:
          - api
          - ui

jobs:
  deploy:
    name: Deploy ${{ inputs.app }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency: deploy-${{ inputs.app }}-${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy to Fly.io
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            CONFIG_FILE="apps/${{ inputs.app }}/fly.staging.toml"
          elif [ "${{ inputs.environment }}" = "production" ]; then
            CONFIG_FILE="apps/${{ inputs.app }}/fly.prod.toml"
          else
            echo "Invalid environment: ${{ inputs.environment }}"
            exit 1
          fi

          echo "Deploying ${{ inputs.app }} to ${{ inputs.environment }} using $CONFIG_FILE"

          # UI: inject source maps via build arg + secrets (secrets come from GH environment)
          if [ "${{ inputs.app }}" = "ui" ]; then
            flyctl deploy --remote-only \
              --config "$CONFIG_FILE" \
              --dockerfile "apps/${{ inputs.app }}/Dockerfile" \
              --build-arg INJECT_SOURCEMAPS=true \
              --build-secret POSTHOG_CLI_TOKEN="${{ secrets.POSTHOG_CLI_TOKEN }}" \
              --build-secret POSTHOG_CLI_ENV_ID="${{ secrets.POSTHOG_CLI_ENV_ID }}"
          else
            flyctl deploy --remote-only \
              --config "$CONFIG_FILE" \
              --dockerfile "apps/${{ inputs.app }}/Dockerfile"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
