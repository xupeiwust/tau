name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  # Job 1: Notify external contributors that approval is needed
  # This runs immediately when an untrusted user requests Claude
  notify-approval-needed:
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude') &&
      !contains(github.event.comment.body, '/approve-claude') &&
      !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Post approval needed comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const requester = context.payload.comment.user.login;
            const originalComment = context.payload.comment.body;
            const issueNumber = context.issue.number;

            const body = `### 🤖 Claude Assistance Requested

            @${requester} has requested Claude assistance on this PR.

            > ${originalComment.split('\n').join('\n> ')}

            ---

            **⏳ Waiting for maintainer approval**

            This request is from an external contributor and requires approval before Claude can run.

            **Maintainers:** To approve this request, comment:
            \`\`\`
            /approve-claude
            \`\`\``;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });

  # Job 2: Run Claude when a maintainer approves an external request
  # Triggered by a trusted user commenting /approve-claude
  claude-approved:
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/approve-claude') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Additional permissions for Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Claude CLI arguments - model and tools configuration
          claude_args: |
            --model opus
            --allowedTools "Bash(pnpm *),Bash(nx *),Bash(npm *),Bash(git *),Bash(gh *)"

  # Job 3: Run Claude directly for trusted users (OWNER, MEMBER, COLLABORATOR)
  # No approval needed - runs immediately
  claude:
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        !contains(github.event.comment.body, '/approve-claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') ||
         contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)) ||
      (github.event_name == 'issues' &&
        github.event.action == 'labeled' && github.event.label.name == 'claude')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Additional permissions for Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Claude CLI arguments - model and tools configuration
          claude_args: |
            --model opus
            --allowedTools "Bash(pnpm *),Bash(nx *),Bash(npm *),Bash(git *),Bash(gh *)"
