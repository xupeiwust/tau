# Netlify configuration for Tau UI (production site: `taucad-prod`, https://tau.new)
#
# Authoritative for **build-time** configuration only. Per Netlify's
# environment-variable model, values declared in `[context.*.environment]` are
# injected during the build container's lifetime and ARE NOT visible to
# Netlify Functions (SSR) at request time. Because this app SSRs via React
# Router on Netlify Functions, every endpoint URL we read from `process.env`
# inside server code (apps/ui/app/environment.config.ts) MUST also exist as a
# dashboard env var with `runtime` (and `functions`) scope, or SSR will see
# `undefined` and BetterAuth/etc. will throw.
#
# Convention:
#   - **Endpoint URLs** (TAU_API_URL / TAU_WEBSOCKET_URL / TAU_FRONTEND_URL)
#     and **NODE_ENV** are duplicated here AND in the dashboard. The TOML
#     entries cover the build container; the dashboard entries cover SSR.
#     Keep them in sync; review both together when changing endpoints.
#   - **Secrets** (POSTHOG_API_KEY, SENTRY_AUTH_TOKEN, …) live ONLY in the
#     dashboard.
#   - **NODE_ENV** in the dashboard MUST be scoped to `functions,runtime`
#     ONLY — never to `builds`. Setting `NODE_ENV=production` at build time
#     makes pnpm skip devDependencies, breaking the Vite build.
#
# This config is invoked by `.github/workflows/prod-deploy-ui.yml` via
# `netlify deploy --prod --config apps/ui/netlify.prod.toml`. The
# `taucad-prod` site has no Git integration wired (provisioning script in
# `scripts/netlify-provision-prod.sh` creates it bare), so auto-builds are
# inherently impossible — the only deploy path is the manual
# `workflow_dispatch`.
#
# Staging uses `apps/ui/netlify.toml` (default Netlify config), wired to the
# `taucad` site via the Netlify GitHub integration. Both files share the
# same `[build]` command and `[[headers]]` block so security posture stays
# in sync; only endpoints diverge.
#
# NX_PREFER_NODE_STRIP_TYPES: NODE_ENV=production causes pnpm to skip
# devDependencies (including @swc/core). Nx needs a TS transpiler to load
# plugin config files (e.g. playwright.config.ts) during project graph
# construction. This env var tells Nx to use Node's native type stripping
# instead of SWC/ts-node, which requires no additional packages.

[build]
command = "NX_PREFER_NODE_STRIP_TYPES=true pnpm nx build ui"
publish = "apps/ui/build/client"

# Production context — the only deploy context for this site (PR previews
# and branch deploys live on the staging `taucad` site, not here).
[context.production]
command = "NX_PREFER_NODE_STRIP_TYPES=true pnpm nx build ui"
[context.production.environment]
NODE_ENV = "production"
TAU_API_URL = "https://api.tau.new"
TAU_WEBSOCKET_URL = "wss://api.tau.new"
TAU_FRONTEND_URL = "https://tau.new"

[[headers]]
for = "/*"
[headers.values]
# XSS Protection
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
# Clickjacking Protection
X-Frame-Options = "DENY"
# HSTS (forces HTTPS)
Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
# Referrer Policy
Referrer-Policy = "strict-origin-when-cross-origin"
# Permissions Policy (Feature Policy)
Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()"
# Cross-Origin Policies
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Resource-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"
# JavaScript Profiling
Document-Policy = "js-profiling"
# Content Security Policy (CSP) - Start with report-only mode
# NOTE: Test thoroughly before switching to enforcing mode
# Remove '-Report-Only' suffix to enforce
# connect-src allowlist:
#   - 'self' covers same-origin SSR fetches (proxied PostHog at /api/ph,
#     proxied GitHub avatars at /api/github-avatar, health endpoints).
#   - https://api.zoo.dev / https://api.kittycad.io: Zoo external converter API
#     used by the @taucad/runtime transcoder pipeline (server-to-server).
#   - https://api.tau.new + wss://api.tau.new: explicit production API +
#     Socket.IO endpoint. Listed explicitly so when CSP flips to enforcing
#     (R11) we don't rely on the catch-all `wss:` and any unintended hop is
#     immediately reported.
Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://api.zoo.dev https://api.kittycad.io https://api.tau.new wss://api.tau.new wss:; worker-src 'self' blob:; child-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"
