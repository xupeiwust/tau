# Netlify configuration for Tau UI — shared by staging (`taucad`, taucad.dev) and
# production (`taucad-prod-us`, tau.new).
#
# This file is **build config only**: commands, `[dev]`, and `[[headers]]`.
# Per-site `TAU_*`, `NODE_ENV`, and PostHog CLI secrets live in the Netlify
# dashboard via Terraform (`repos/cloud-infra/stacks/cloud/{staging,prod-us}`).
# Pattern follows novuhq/novu: one `netlify.toml` shape, sites differ by dashboard env.
#
# Triggers:
#   - staging: pushes to `main` (production context) + PR previews (`taucad` site).
#   - prod: pushes to Git branch `production` after merging the bot-managed trail PR
#     (see `.github/workflows/prepare-prod-release.yml`).
#
# SOURCE MAPS (`pnpm nx run ui:sourcemaps`): run inside the Netlify build for
# **production context** only (`[build]` + `[context.production]` include them);
# previews skip sourcemaps uploads to avoid leaking prod PostHog project keys into
# PR builds (POSTHOG_CLI_* are still present on staging for main-branch builds —
# use a distinct PostHog env per site in Terraform if needed).
#
# NX_PREFER_NODE_STRIP_TYPES: NODE_ENV=production at build time would make pnpm
# skip devDependencies (including @swc/core). Nx needs a TS transpiler to load
# plugin config files — this flag uses Node's native type stripping instead.

[build]
# Paths relative to site base directory (`apps/ui`, set in Terraform).
command = "NX_PREFER_NODE_STRIP_TYPES=true pnpm nx build ui && pnpm nx run ui:sourcemaps"
publish = "build/client"

[context.production]
command = "NX_PREFER_NODE_STRIP_TYPES=true pnpm nx build ui && pnpm nx run ui:sourcemaps"

[context.deploy-preview]
command = "NX_PREFER_NODE_STRIP_TYPES=true pnpm nx build ui"

[context.branch-deploy]
command = "NX_PREFER_NODE_STRIP_TYPES=true pnpm nx build ui"

[dev]
command = "pnpm nx dev ui"
targetPort = 3000
autoLaunch = false

[dev.environment]
NODE_ENV = "development"
TAU_API_URL = "http://localhost:4000"
TAU_FRONTEND_URL = "http://localhost:3000"
TAU_WEBSOCKET_URL = "ws://localhost:4001"

[[headers]]
for = "/*"
[headers.values]
# XSS Protection
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
# Clickjacking Protection
X-Frame-Options = "DENY"
# HSTS (forces HTTPS)
Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
# Referrer Policy
Referrer-Policy = "strict-origin-when-cross-origin"
# Permissions Policy (Feature Policy)
Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()"
# Cross-Origin Policies
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Resource-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"
# JavaScript Profiling
Document-Policy = "js-profiling"
# Content Security Policy (CSP) - Start with report-only mode
# NOTE: Test thoroughly before switching to enforcing mode
# Remove '-Report-Only' suffix to enforce
# connect-src allowlist:
#   - 'self' covers same-origin SSR fetches (proxied PostHog at /api/ph,
#     proxied GitHub avatars at /api/github-avatar, health endpoints).
#   - https://api.zoo.dev / https://api.kittycad.io: Zoo external converter API
#     used by the @taucad/runtime transcoder pipeline (server-to-server).
#   - https://api.tau.new + wss://api.tau.new: explicit production API +
#     Socket.IO endpoint. Listed explicitly so when CSP flips to enforcing
#     (report-only first) we don't rely on the catch-all `wss:` and any unintended hop is
#     immediately reported.
Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://cdn.taucad.dev https://cdn.tau.new https:; font-src 'self' data:; connect-src 'self' https://cdn.taucad.dev https://cdn.tau.new https://api.zoo.dev https://api.kittycad.io https://api.tau.new wss://api.tau.new wss:; worker-src 'self' blob:; child-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"

# Content-hashed Vite bundles + WASM (immutable filenames)
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Netlify-CDN-Cache-Control = "public, durable, max-age=31536000"

[[headers]]
for = "/fonts/*"
[headers.values]
Cache-Control = "public, max-age=2592000"
Netlify-CDN-Cache-Control = "public, durable, max-age=2592000"

[[headers]]
for = "/*.svg"
[headers.values]
Cache-Control = "public, max-age=86400"
Netlify-CDN-Cache-Control = "public, durable, max-age=86400"
