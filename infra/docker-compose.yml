services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: tau-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: tau_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev_user -d tau_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tau-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: tau-otel-lgtm
    restart: unless-stopped
    environment:
      GF_INSTALL_PLUGINS: redis-datasource,grafana-postgresql-datasource
    ports:
      - '6100:3000' # Grafana UI
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
      - '9090:9090' # Prometheus
      - '3100:3100' # Loki
      - '3200:3200' # Tempo
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./grafana/provisioning:/otel-lgtm/grafana/conf/provisioning
      - ./grafana/dashboards:/otel-lgtm/grafana/dashboards
      - ./grafana/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml
      - otel_lgtm_data:/data

volumes:
  postgres_data:
  redis_data:
  otel_lgtm_data:
