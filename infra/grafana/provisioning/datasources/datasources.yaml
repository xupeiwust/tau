apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://localhost:3100
    editable: true

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://localhost:3200
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
      tracesToMetrics:
        datasourceUid: prometheus
      lokiSearch:
        datasourceUid: loki
      serviceMap:
        datasourceUid: prometheus

  - name: Pyroscope
    type: grafana-pyroscope-datasource
    uid: pyroscope
    access: proxy
    url: http://localhost:4040
    editable: true

  - name: Redis
    type: redis-datasource
    uid: redis
    access: proxy
    url: redis://host.docker.internal:6379
    editable: true

  - name: PostgreSQL
    type: grafana-postgresql-datasource
    uid: postgresql
    access: proxy
    url: host.docker.internal:5432
    editable: true
    jsonData:
      database: tau_dev
      sslmode: disable
    secureJsonData:
      password: dev_password
    user: dev_user
