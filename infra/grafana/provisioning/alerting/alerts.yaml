# Grafana Alerting Rules for Tau API
# These are provisioned as code via the grafana/otel-lgtm volume mount.
# In production (Fly.io managed Grafana), import these via the Grafana API.
#
# To configure Grafana Cloud alerts, set OTEL_EXPORTER_OTLP_ENDPOINT and
# OTEL_EXPORTER_OTLP_HEADERS as Fly.io secrets:
#
#   fly secrets set OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-<region>.grafana.net/otlp
#   fly secrets set OTEL_EXPORTER_OTLP_HEADERS="Authorization=Basic <base64(instanceId:apiKey)>"

apiVersion: 1

groups:
  - orgId: 1
    name: tau-critical
    folder: Tau Alerts
    interval: 1m
    rules:
      - uid: redis-connection-lost
        title: 'P0: Redis Connection Lost'
        condition: redis_down
        data:
          - refId: redis_down
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: redis_connection_state{service_name="tau-api"} == 0
              intervalMs: 15000
              maxDataPoints: 20
        for: 1m
        annotations:
          summary: Redis connection is down. Chat RPC, session management, and adapter services are degraded.
          runbook_url: ''
        labels:
          severity: critical
          service: tau-api
          component: redis

  - orgId: 1
    name: tau-warning
    folder: Tau Alerts
    interval: 1m
    rules:
      - uid: rpc-failure-rate
        title: 'P1: RPC Failure Rate Spike'
        condition: rpc_errors_high
        data:
          - refId: rpc_errors_high
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: >
                sum(rate(rpc_server_call_duration_count{service_name="tau-api",rpc_status="error"}[5m]))
                / sum(rate(rpc_server_call_duration_count{service_name="tau-api"}[5m])) > 0.1
              intervalMs: 15000
              maxDataPoints: 20
        for: 5m
        annotations:
          summary: RPC error rate exceeds 10% over 5 minutes.
        labels:
          severity: warning
          service: tau-api
          component: rpc

      - uid: ws-disconnect-storm
        title: 'P1: WebSocket Disconnect Storm'
        condition: ws_disconnect_spike
        data:
          - refId: ws_disconnect_spike
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: >
                rate(ws_disconnections_total{service_name="tau-api",ws_close_reason=~"transport close|transport error|ping timeout"}[5m]) > 1
              intervalMs: 15000
              maxDataPoints: 20
        for: 2m
        annotations:
          summary: High rate of abnormal WebSocket disconnections detected.
        labels:
          severity: warning
          service: tau-api
          component: websocket

      - uid: llm-error-rate
        title: 'P1: LLM API Error Rate'
        condition: llm_errors
        data:
          - refId: llm_errors
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: >
                sum(rate(gen_ai_client_operation_duration_count{service_name="tau-api",error_type!=""}[10m]))
                / sum(rate(gen_ai_client_operation_duration_count{service_name="tau-api"}[10m])) > 0.05
              intervalMs: 15000
              maxDataPoints: 20
        for: 5m
        annotations:
          summary: LLM API error rate exceeds 5%.
        labels:
          severity: warning
          service: tau-api
          component: ai

      - uid: high-5xx-rate
        title: 'P1: High 5xx Error Rate'
        condition: http_5xx_high
        data:
          - refId: http_5xx_high
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: >
                sum(rate(http_server_duration_count{service_name="tau-api",http_status_code=~"5.."}[5m]))
                / sum(rate(http_server_duration_count{service_name="tau-api"}[5m])) > 0.05
              intervalMs: 15000
              maxDataPoints: 20
        for: 5m
        annotations:
          summary: HTTP 5xx error rate exceeds 5% over 5 minutes.
        labels:
          severity: warning
          service: tau-api
          component: api
