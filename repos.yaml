version: 1
repos_dir: repos
owner: taucad
groups:
  cad:
    description: Core CAD/geometry libraries and tools
    repos:
      - replicad
      - replicad-cli
      - opencascade.js
      - manifold
      - OCCT
      - lib3mf
      - spec_core
      - openscad-playground
      - jscadui
      - phyz
      - bitbybit
      - bitbybit-occt
      - brepjs
      - zalo-opencascade.js
      - ForgeCAD
      - tinyusdz
      - SysML-v2-Release
      - rhino3dm
      - ammo.js
      - box2d-wasm
      - draco
      - occt-import-js
      - skia
      - opencv
  slicers:
    description: 3D printer slicer applications
    repos:
      - BambuStudio
      - OrcaSlicer
      - PrusaSlicer
  ai:
    description: AI/LLM framework libraries
    repos:
      - langchainjs
      - langgraphjs
      - ai
      - deepagentsjs
      - anthropic-quickstarts
      - cline
      - aider
      - open-interpreter
      - bolt.diy
      - novu
      - atopile
      - props
  3d:
    description: 3D rendering and visualization
    repos:
      - three.js
      - react-three-fiber
      - model-viewer
      - three-gltf-viewer
      - Online3DViewer
      - glTF-Transform
      - assimpjs
      - three-viewport-gizmo
      - three-mesh-bvh
      - three-cad-viewer
  dev-tools:
    description: Development tools and frameworks
    repos:
      - nx
      - pnpm
      - vscode
      - typescript-go
      - xstate
      - dockview
      - headless-tree
      - fumadocs
      - zod
      - v8
      - motion
      - oxc
      - oxc-vscode
      - tailwindcss-intellisense
      - react-router
      - vaul
      - type-fest
      - xyflow
      - shiki
      - tsdown
      - rolldown
      - knip
      - agentfs
      - primitives
      - trpc
      - hono
      - effect
      - drizzle-orm
      - elysia
      - VSCode_SysML_Extension
      - vscode-wasm
  tscircuit:
    description: tscircuit EDA ecosystem
    repos:
      - tscircuit/core
      - tscircuit/runframe
      - tscircuit/circuit-json
      - tscircuit/tscircuit.com
  zenfs:
    description: ZenFS filesystem abstractions
    repos:
      - zenfs/core
      - zenfs/dom
      - zenfs/emscripten
  reference:
    description: Reference and documentation repos
    repos:
      - documentation
      - claude-code-system-prompts
      - step-file-syntax
      - zoo-modeling-app
      - ui
      - javascript
      - gemm
      - emscripten
  infra:
    description: Cloud infrastructure-as-code (Terraform/Fly.io/Netlify/Supabase)
    repos:
      - cloud-infra
      - terraform-provider-netlify
